name: MacType
options:
  bundleIdPrefix: com.mactype
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.1"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: MacType
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_ENTITLEMENTS: ""

targets:
  MacType:
    type: application
    platform: macOS
    sources:
      - path: MacType/Sources
        type: group
      - path: MacType/Resources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mactype.MacType
        INFOPLIST_FILE: MacType/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: MacType/Resources/Info.plist
      properties:
        CFBundleName: MacType
        CFBundleDisplayName: MacType
        CFBundleIdentifier: com.mactype.MacType
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: MacType
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true

  MacTypeTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MacTypeTests
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mactype.MacTypeTests
        PRODUCT_NAME: MacTypeTests
        INFOPLIST_FILE: MacTypeTests/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_MODULE_NAME: MacTypeTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MacType.app/Contents/MacOS/MacType"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: MacType
    info:
      path: MacTypeTests/Info.plist
      properties:
        CFBundleName: MacTypeTests
        CFBundleIdentifier: com.mactype.MacTypeTests
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        CFBundlePackageType: BNDL
        CFBundleExecutable: MacTypeTests